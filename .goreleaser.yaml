# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# See https://goreleaser.com — run: goreleaser check | goreleaser release --snapshot --clean
version: 2

project_name: dq

before:
  hooks:
    - go mod tidy

builds:
  - id: dq
    main: ./cmd/dq
    binary: dq
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/SomniSom/docker-ops/internal/version.Version={{.Version}}
      - -X github.com/SomniSom/docker-ops/internal/version.Commit={{.ShortCommit}}

archives:
  - id: dq
    builds:
      - dq
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - readme.md

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs?"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  draft: false
